name: CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Paso para comprobar el código (Checkout)
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 2. Paso para realizar el linting del código
      - name: Lint with flake8
        run: |
          # Detener el build si hay errores de sintaxis de Python o undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 3. Paso para ejecutar pruebas unitarias utilizando nosetests
      - name: Run unit tests with nose
        run: |
          nosetests --with-spec --spec-color --with-coverage --cover-package=service
